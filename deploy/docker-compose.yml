services:
  borg:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.borg
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - borg_store:/app/store
    environment:
      - RUST_LOG=info
      - WEB_BIND=0.0.0.0
    env_file:
      - .env

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  borg_store:
