name: Mobile Build
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        run: cd apps/mobile && bun install
      - name: Build iOS
        run: cd apps/mobile && eas build --platform ios --non-interactive --profile production
      - name: Build Android
        run: cd apps/mobile && eas build --platform android --non-interactive --profile production
